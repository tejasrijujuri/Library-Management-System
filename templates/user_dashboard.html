<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <style>
        /* General Styling */
        * {
            box-sizing: border-box;
            margin:0;
        }
body {
    font-family: 'Arial', sans-serif;
    color: #333;
    background: linear-gradient(135deg, #f2f2f2 40%, #e0eafc 100%);
    display:flex;
    flex-direction: column;
    min-height:100vh;
}

main {
    flex-grow:1;
}

header {
    display:flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    background: linear-gradient(90deg, #003366 0%, #004c99 100%);
    color: white;
    position: relative;
}

#symbol{
    background-color:rgba(0, 0, 0, 0.308);
    color:gold;
    text-align:center;
    width: 50px;
    height: auto;
    border-radius:50%;
}

.logo-container {
    position: absolute;
    top: 20px;
    left: 20px;
}

.logo {
    height: 100px;
    border-radius:6px;
}

.animated-title {
    font-size: 2.5em;
    font-family:"Times New Roman", serif;
    font-style:italic;
    margin: 0;
    animation: slideIn 2s ease-in-out;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(-100px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Navigation Styling */
nav {
    text-align: center;
    padding: 15px 0;
    background: #6a11cb;
    background: linear-gradient(90deg, #003366 0%, #004c99 100%);
    /*background: linear-gradient(90deg, #f7971e 0%, #ffd200 100%);*/
}

nav .nav-link {
    text-decoration: none;
    color: white;
    font-family:"Times New Roman", serif;
    font-style:italic;
    padding: 0 15px;
    font-size: 1.2em;
    transition: color 0.3s ease;
}

nav .nav-link:hover {
    color: #ffde59;
}

/* Filter and Search Section */
.filters {
    margin: 20px auto;
    text-align: center;
}

.filter-select {
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* Search Bar and Button Styling */
.search-input {
    width: 250px;
    padding: 10px;
    margin-right: 10px;
    border: none;
    border-radius: 30px;
    box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
    font-size: 1em;
    outline: none;
    transition: box-shadow 0.3s ease, width 0.3s ease;
}

.search-input:focus {
    width: 300px;
    box-shadow: 0 5px 10px rgba(0, 0, 0, 0.15);
}

.search-button {
    padding: 10px 25px;
    background: linear-gradient(90deg, #003366 0%, #004c99 100%);
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 1em;
    box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
    transition: background 0.3s ease, box-shadow 0.3s ease;
}

.search-button:hover {
    background: linear-gradient(135deg, #004c99, #003366);
    box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
}

.search-button:active {
    background: linear-gradient(90deg, #003366 0%, #004c99 100%);
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
}


/* Book Grid */
.book-grid {
    display: flex;
    gap:20px;
    margin:10px 20px auto 20px;
    width: 20%;
    height:25%;

}

.book-card {
    background: white;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    text-align: center;
}

.book-card:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
}

.book-card img {
    max-height: 150px;
    margin-bottom: 4px;
    border:2px solid black;
    border-radius:2px;
}

.book-card h5 {
    color: #333;
}

.book-card p {
    font-size: 0.7em;
    color: #666;
}

.read-btn {
    background: #2575fc;
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    margin-top: 10px;
    cursor: pointer;
    transition: background 0.3s ease;
}

.read-btn a {
    color: white;
    text-decoration: none;
}

.read-btn:hover {
    background: #1f0de9;
}


footer {
    background: linear-gradient(90deg, #035eb9 0%, #004c99 100%);
    color: white;
    padding: 15px;
    text-align: center;
    position: relative;
    bottom: 0;
    width: 100%;
}

footer p {
    margin: 0;
    font-weight: bolder;
    letter-spacing: 1px;
}

footer p:hover {
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    transition: text-shadow 0.3s ease-in-out;
}


@media (max-width: 600px) {
    .book-card {
        margin:0;
    }
}

    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <h1 class="animated-title" id="symbol">e</h1>
        <h1 class="animated-title">-Library</h1>
    </header>

    <!-- Navigation Menu -->
    <nav>
        <a href="{{ url_for('user_dashboard') }}" class="nav-link">Home</a>
        <a href="{{ url_for('profile') }}" class="nav-link">Profile</a>
        <a href="{{ url_for('about') }}" class="nav-link">About</a>
        <a href="{{ url_for('logout') }}" class="nav-link">Logout</a>
    </nav>

    <!-- Main Section -->
    <main>
        <!-- Category Filter and Search Bar -->
        <div class="filters">
            <form method="GET" action="{{ url_for('search_books') }}">
                <!-- Category Dropdown -->
                <label for="category">Category:</label>
                <select name="category" id="category" class="filter-select">
                    <option value="">All Categories</option>
                    {% for category in categories %}
                    <option value="{{ category }}" {% if category == selected_category %}selected{% endif %}>
                        {{ category }}
                    </option>
                    {% endfor %}
                </select>

                <!-- Search bar -->
                <label for="query">Search:</label>
                <input type="text" name="query" id="query" class="search-input" placeholder="Search by book title, author..." value="{{ search_query }}">

                <button type="submit" class="search-button">Search</button>
            </form>
        </div>

        <h2 class="section-title">Available Books:</h2>
        <div class="book-grid">
            {% if books %}
            {% for book in books %}
            <div class="book-card">
                <a href="{{ url_for('on_click',book_id=book._id ) }}"><img id="book-image" src="{{ url_for('static', filename='images/' ~ book['image']) }}" alt="{{ book['title'] }}"></a>
                <h5>{{ book['title'] }}</h5>
                <p>by {{ book['author'] }}</p>
            </div>
            {% endfor %}
            {% else %}
            <p>No books found for the selected category or search query.</p>
            {% endif %}
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Library Management System. All rights reserved.</p>
    </footer>
</body>

</html>
