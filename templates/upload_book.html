<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management - Upload a Book</title>
    <style>
        /* Global Styles */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #f7f7f7, #eaeaea);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100vh;
            background-image: url('path_to_background_image.jpg'); /* Add your background image */
            background-size: cover;
            background-position: center;
        }

        /* Navigation */
        nav {
            background: #008080;
            padding: 1rem;
            text-align: center;
            margin-bottom:10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #ffde59;
        }

        /* Main Section */
        main {
            background: rgba(255, 255, 255, 0.9);
            padding: 2rem;
            margin: 2rem auto;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            width: 80%;
            max-width: 600px;
            animation: fadeIn 1s ease-in-out;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 1rem;
            color: #444;
            font-weight: bold;
        }

        input, select, textarea, button {
            margin-top: 0.5rem;
            padding: 0.5rem;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        input[type="file"] {
            padding: 0.2rem;
        }

        button {
            background: #008080;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 1rem;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        button:hover {
            background: #005f5f;
        }

        /* Footer */
        footer {
            background: #333;
            color: white;
            padding: 1rem;
            text-align: center;
            margin-top: auto;
        }

        /* Brand Logo */
        #brand-logo {
            display: block;
            margin: 0 auto 2rem;
            width: 100px;
        }

        /* Animations */
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(-20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #008080;
            box-shadow: 0 0 10px rgba(0, 128, 128, 0.5);
        }
        
        /* Modal styles */
        .modal {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4); /* Black background with opacity */
        }

        .modal-content {
            background-color: #fff;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 30%;
            text-align: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        .close-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin-top: 20px;
        }

    </style>
</head>
<body>

    <!-- Navigation Menu -->
    <nav>
        <a href="{{ url_for('admin_dashboard') }}">Admin Dashboard</a>
    </nav>

    <!-- Brand Logo -->
    <img id="brand-logo" src="{{ url_for('static', filename='images/logo1.jpg')}}" alt="Brand Logo"> <!-- Add your brand logo path -->

    <!-- Main Section for Book Upload Form -->
    <main>
        <h2>Upload a New Book</h2>

        <form id="uploadForm" action="{{ url_for('upload_book') }}" method="POST" enctype="multipart/form-data">
            <!-- Book Name -->
            <label for="book_name">Book Name:</label>
            <input type="text" id="book_name" name="book_name" required>

            <!-- Author Name -->
            <label for="author_name">Author Name:</label>
            <input type="text" id="author_name" name="author_name" required>

            <!-- Book Category -->
            <label for="category">Book Category:</label>
            <select id="category" name="category" required>
                <option value="">Select Category</option>
                <option value="Fiction">Fiction</option>
                <option value="Non-fiction">Non-fiction</option>
                <option value="Science">Science</option>
                <option value="Biography">Biography</option>
                <option value="History">History</option>
            </select>

            <!-- Description -->
            <label for="description">Description:</label>
            <textarea id="description" name="description" rows="4" required></textarea>

            <!-- Book File (PDF or other formats) -->
            <label for="book_file">Book File: (.epub, .docx, .txt)</label>
            <input type="file" id="book_file" name="book_file" accept=".epub,.docx,.txt" required>

            <!-- Book Image -->
            <label for="book_image">Book Image: (.jpg, .png)</label>
            <input type="file" id="book_image" name="book_image" accept=".jpg,.png" required>

            <!-- Upload Button -->
            <button type="submit">Upload Book</button>
        </form>
    </main>

     <!-- Modal -->
     <div id="successModal" class="modal">
        <div class="modal-content">
            <h3>Book uploaded successfully!</h3>
            <button id="closeModal" class="close-btn">Close</button>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Library Management System. All rights reserved.</p>
    </footer>

    <script>
        // Get the modal element
        const modal = document.getElementById("successModal");
        const closeModalButton = document.getElementById("closeModal");

        // Handle form submission
        document.getElementById("uploadForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Prevent default form submission

            // Simulate form submission process (e.g., display modal before real submission)
            modal.style.display = "block"; // Show the success modal
            
            // After a short delay, submit the form programmatically
            setTimeout(function() {
                document.getElementById("uploadForm").submit(); // Submit the form after showing the modal
            }, 2000); // 2 second delay before form submission
        });

        // When the user clicks on the close button, hide the modal
        closeModalButton.addEventListener("click", function() {
            modal.style.display = "none";
        });

        // Close the modal if the user clicks outside of it
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        };
    </script>
</body>
</html>
