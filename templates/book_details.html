<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ book['title'] }}</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f5f5f5;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
            font-size: 2em;
        }

        img {
            display: block;
            margin: 0 auto 20px;
            border-radius: 8px;
        }

        p {
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        p strong {
            color: #555;
        }


        a {
            display: inline-block;
            margin-top: 20px;
            color: #007bff;
            text-decoration: none;
            font-size: 1.1em;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ book['title'] }}</h1>
        <img src="{{ url_for('static', filename='images/' ~ book['image']) }}" alt="{{ book['title'] }}" style="width: 200px;">
        <p><strong>Author:</strong> {{ book['author'] }}</p>
        <p><strong>Description:</strong> {{ book['description'] }}</p>
        <a href="{{ url_for('manage_book') }}">Back to Book Section</a>
    </div>
</body>
</html>
