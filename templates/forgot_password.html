<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Library Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forgot.css') }}">
    <style>
        /* Reset some default browser styling */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Roboto', sans-serif;
}

/* Background styling */
body {
    /*background: url("{{ url_for('static', filename='images/forgot.jpg') }}") no-repeat center center fixed;*/
    background: linear-gradient(to right, rgb(5, 61, 151), rgb(235, 235, 235));
    background-size: cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
}

/* Styling for the heading section */
.heading {
    text-align: center;
    margin-bottom: 30px;
    animation: slideInDown 1s ease-in-out;
}

.heading h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #fff;
}

.heading p {
    font-size: 1.2em;
    color: #fa0101;
}

/* Logo styling */
.logo {
    width: 120px;
    height: auto;
    margin-bottom: 15px;
    animation: fadeIn 1.5s ease-in-out;
}

/* Form container styling */
.forgot-form {
    background-color: rgba(0, 0, 0, 0.8);
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    width: 400px;
    text-align: center;
    animation: zoomIn 0.8s ease;
}

/* Input fields styling */
.forgot-form input[type="email"],
.forgot-form input[type="text"] {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 5px;
    background-color: #ddd;
    font-size: 1em;
    color: #333;
}

.forgot-form input[type="email"]:focus,
.forgot-form input[type="text"]:focus {
    outline: none;
    border: 2px solid #66afe9;
    box-shadow: 0 0 10px rgba(102, 175, 233, 0.8);
}

/* Button styling */
.forgot-form button[type="submit"] {
    background-color: #4CAF50;
    color: white;
    padding: 15px 20px;
    border: none;
    border-radius: 5px;
    font-size: 1.2em;
    cursor: pointer;
    transition: background-color 0.3s ease;
}

.forgot-form button[type="submit"]:hover {
    background-color: #45a049;
}

/* Back to login link styling */
.login-link a {
    display: block;
    margin-top: 20px;
    color: #4CAF50;
    text-decoration: none;
    font-size: 1em;
    transition: color 0.3s ease;
}

.login-link a:hover {
    color: #fff;
}

/* Modal Styling */
.modal {
    display: none; /* Hidden by default */
    position: fixed;
    z-index: 1;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.75);
    animation: fadeIn 0.5s ease;
}

.modal-content {
    background-color: #333;
    margin: 15% auto;
    padding: 20px;
    border: 1px solid #888;
    width: 50%;
    color: #fff;
    text-align: center;
    border-radius: 10px;
    animation: zoomIn 0.5s ease;
}

.close {
    color: #aaa;
    float: right;
    font-size: 28px;
    font-weight: bold;
}

.close:hover,
.close:focus {
    color: #fff;
    cursor: pointer;
}

/* Footer styling */
footer {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
    color: #000000;
    font-weight:bolder;
    font-size: 0.9em;
    animation: fadeIn 2s ease;
}

/* Animations */
@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

@keyframes slideInDown {
    from {
        transform: translateY(-100%);
    }
    to {
        transform: translateY(0);
    }
}

@keyframes zoomIn {
    from {
        transform: scale(0.5);
    }
    to {
        transform: scale(1);
    }
}

    </style>
</head>
<body>
    <!-- Heading -->
    <div class="heading">
        <img src="{{ url_for('static', filename='images/logo1.jpg') }}" alt="Library Logo" class="logo">
        <h1>Forgot Password</h1>
        <p>Don't worry! We'll help you reset it.</p>
    </div>

    <!-- Forgot Password Form -->
    <form id="forgot-form" method="POST" action="{{ url_for('forgot_password') }}" class="forgot-form">
        <label for="email">Enter your registered email address:</label>
        <input type="email" id="email" name="email" required>

        <label for="security_question">What was the name of your first pet?</label>
        <input type="text" id="security_question" name="security_answer" required>

        <button type="submit">Submit</button>

        <!-- Back to Login Link -->
        <div class="login-link">
            <a href="{{ url_for('login') }}">← Back to Login</a>
        </div>
    </form>

    <!-- Modal for success and error messages -->
    <div id="message-modal" class="modal">
        <div class="modal-content">
            <span id="close-modal" class="close">&times;</span>
            <p id="modal-message"></p>
        </div>
    </div>

    <footer>
        &copy; 2024 Library Management System. All rights reserved.
    </footer>

    <script>
        // Fetch flash messages from Flask using inline script
        const messages = {{ get_flashed_messages(with_categories=true) | tojson }};
        
        // Show modal with message if there are any flash messages
        if (messages.length > 0) {
            const modal = document.getElementById('message-modal');
            const modalMessage = document.getElementById('modal-message');
            const closeModalButton = document.getElementById('close-modal');
            
            // Set the message text and show the modal
            modalMessage.textContent = messages[0][1];  // Use the first flash message
            modal.style.display = 'block';
            
            // Hide the modal when clicking the close button
            closeModalButton.onclick = function() {
                modal.style.display = 'none';
            };
    
            // Hide the modal after 3 seconds automatically
            setTimeout(function() {
                modal.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
