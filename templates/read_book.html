<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ book.title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .book-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .book-title {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
        }
        .book-content {
            margin-top: 20px;
            text-align: center;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: none;
        }
        pre {
            white-space: pre-wrap; /* Ensures text wraps correctly */
        }
        h1,p {
            font-family: initial;
            text-align:center;
        }
        h1 {
            text-decoration: underline;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="book-container">
        <h1 class="book-title">{{ book.title }}</h1>
        <p>Author: {{ book.author }}</p>
        <div class="book-content">
            {% if file_type == 'pdf' %}
                <!-- Display PDF in iframe -->
                <iframe src="{{ file_url }}"></iframe>
            {% elif file_type == 'docx' %}
                <!-- Display DOCX as HTML -->
                <div class="docx-content" style="font-size:medium;">
                    {{ content | safe }}
                </div>
            {% elif file_type == 'epub' %}
                <!-- Display EPUB as HTML -->
                <div class="epub-content">
                    {{ content | safe }}
                </div>
            {% elif file_type == 'text' %}
                <!-- Display Text File -->
                <div class="text-content" style="font-size:large; font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;">
                    <pre>{{ content }}</pre>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
